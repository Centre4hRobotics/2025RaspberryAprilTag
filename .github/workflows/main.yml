name: Run Automated Tests (Pytest)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.9'

    # Cache the virtual environment to speed up any subsequent runs
    - name: Cache virtual environment
      uses: actions/cache@v4
      with:
        path: ./.venv
        key: ${{ runner.os }}-venv-${{ hashFiles('setup_testing_env.sh') }}
        restore-keys: |
          ${{ runner.os }}-venv-

    - name: Setup testing environment
      run: |
        chmod +x setup_testing_env.sh
        ./setup_testing_env.sh

    - name: Run tests
      # --junitxml creates a report file
      run: ./.venv/bin/python -m pytest --junitxml=results.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: results.xml

    - name: Interpret test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          results.xml
